<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>คุณกำลังออฟไลน์อยู่ | First Model Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --primary-purple: #5A2CBE;
      --pure-black: #000000;
      --text-gray: #D4D4D8;
    }
    body {
      background-color: var(--pure-black);
      color: #FFFFFF;
      font-family: 'Prompt', sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .offline-card {
      max-width: 450px;
      width: 100%;
      background: rgba(14, 9, 30, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(147, 51, 234, 0.25);
      border-radius: 24px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
    }
    .icon-box {
      width: 80px;
      height: 80px;
      background-color: rgba(90, 44, 190, 0.1);
      border: 1px solid rgba(147, 51, 234, 0.3);
      color: var(--primary-purple);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px auto;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 12px 0;
      background: linear-gradient(135deg, #FFFFFF 30%, #C084FC 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-gray);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #FFFFFF;
      color: var(--pure-black);
      font-weight: 700;
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon-box">
      <i class="fas fa-wifi-slash"></i>
    </div>
    <h1>การเชื่อมต่ออินเทอร์เน็ตขาดหาย</h1>
    <p>ไม่สามารถโหลดหน้าเว็บได้เนื่องจากโทรศัพท์ของคุณไม่ได้เชื่อมต่ออินเทอร์เน็ตในขณะนี้ โปรไฟล์และแคชโครงสร้างบางส่วนที่เคยเปิดดูแล้วยังคงใช้งานได้ตามปกติครับ</p>
    <button onclick="window.location.reload()" class="retry-btn">
      <i class="fas fa-sync-alt"></i> ลองใหม่อีกครั้ง
    </button>
  </div>
</body>
</html>
