# ==========================================
# 1. Build Settings
# ==========================================
[build]
  publish = "."
  functions = "netlify/functions"

[build.processing]
  skip_processing = false

# ==========================================
# 2. Security & SEO Headers
# ==========================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # การตั้ง Cache ให้ Google เข้ามาอ่านข้อมูลใหม่ได้บ่อยขึ้น
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

# ==========================================
# 3. Edge Functions
# ==========================================
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

[[edge_functions]]
  function = "render-bot"
  path = "/sideline/*"

[[edge_functions]]
  function = "ssr-province"
  path = "/location/*"

# ==========================================
# 4. SEO Redirects & Rewrites (หัวใจสำคัญในการกู้คืนอันดับ)
# ==========================================

# 4.1 Force HTTPS
[[redirects]]
  from = "http://sidelinechiangmai.netlify.app/*"
  to = "https://sidelinechiangmai.netlify.app/:splat"
  status = 301
  force = true

# 4.2 หน้าแรก (Root) ต้องเป็น Rewrite (Status 200) ไม่ใช่ Redirect (301)
# วิธีนี้จะทำให้ Google มองว่าหน้าแรกของคุณคือเนื้อหาของเชียงใหม่ โดยที่ URL ไม่เปลี่ยน
# นี่คือเทคนิคกู้คืน Ranking ของหน้าแรกที่ดีที่สุด
[[redirects]]
  from = "/"
  to = "/location/chiangmai"
  status = 200
  force = false

# 4.3 URL Normalization (จัดการ Query Parameter ให้เป็น Clean URL)
[[redirects]]
  query = {province = ":p"}
  from = "/location/*"
  to = "/location/:p"
  status = 301
  force = true

# 4.4 Redirect นามสกุล .html ออก (Clean URL)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# 4.5 SPA Fallback (ต้องอยู่ล่างสุดเสมอ)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200