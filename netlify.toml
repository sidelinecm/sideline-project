# ==============================================================================
# 1. Build Settings & Platform Target
# ==============================================================================
[build]
  publish = "."
  # ตำแหน่งเก็บฟังก์ชันประมวลผลเซิร์ฟเวอร์เลสทั่วไป
  functions = "netlify/functions"

[build.processing]
  skip_processing = false

# ==============================================================================
# 2. S-Tier Security & Specular Core Web Vitals Headers
# ==============================================================================
# กฎควบคุมความปลอดภัยหลักของเว็บไซต์สำหรับทุกพาร์ททางเข้า
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # การันตีหน้าเว็บคีย์เวิร์ดมีการสื่อสารแบบสดใหม่เสมอ แต่ลดแรงกดโหลดด้วย stale-while-revalidate
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

# ⚡ [เพิ่มใหม่] เร่งความเร็วการโหลดไฟล์ดีไซน์ (CSS) ตลอดปีเพื่อคะแนนสปีดที่ดีที่สุด
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ⚡ [เพิ่มใหม่] เร่งความเร็วการโหลดสคริปต์หลัก (JS)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ⚡ [เพิ่มใหม่] เร่งความเร็วการดึงรูปภาพพื้นหลังและไอคอนภายในระบบ
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==============================================================================
# 3. Optimized Edge Functions Mapping (Consolidated Edge Routing)
# ==============================================================================
# ชี้เป้าหมายให้ Edge Function ชื่อ sitemap (ไฟล์ sitemap.js) ทำหน้าที่สร้างพ่นข้อมูล XML
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

# ชี้เป้าหมายให้ ssr-province เป็นตัวส่งข้อมูลการกรองสปายบอทของ robots.txt
[[edge_functions]]
  function = "ssr-province"
  path = "/robots.txt"

# จัดหน้าแสดงผลเฉพาะของตัวบอทแสกนหน้าโปรไฟล์น้อง ๆ เดี่ยว
[[edge_functions]]
  function = "render-bot"
  path = "/sideline/*"

# ให้ ssr-province ดักจับหน้าภูมิภาค /location/* ทั้งหมดเพื่อส่งข้อมูล Dynamic
[[edge_functions]]
  function = "ssr-province"
  path = "/location/*"

# ให้ ssr-province ดักจับพาร์ทหน้าแรกสุด (/) เพื่อจัดส่งสารบัญจังหวัดเชียงใหม่ทันทีแบบ Zero-Delay
[[edge_functions]]
  function = "ssr-province"
  path = "/"

# ==============================================================================
# 4. SEO Redirects & Rewrites Matrix
# ==============================================================================

# 4.1 URL Normalization: เคลียร์พารามิเตอร์ขยะให้เป็นพาร์ทไดเรกทอรีที่ Google ชื่นชอบ
[[redirects]]
  query = {province = ":p"}
  from = "/location/*"
  to = "/location/:p"
  status = 301
  force = true

# 4.2 SPA Fallback (ต้องอยู่ล่างสุดเสมอ)
# ดักจับลิงก์ฝั่งไคลเอนต์กรณีหาไฟล์หน้าเว็บไม่เจอ เพื่อป้องกันการเกิดหน้าว่าง 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200