# ==========================================
# 1. Build Settings
# ==========================================
[build]
  publish = "."
  # edge functions ใน netlify ต้องอยู่ในโฟลเดอร์ netlify/edge-functions โดยอัตโนมัติ
  # บรรทัด functions ด้านล่างคือ serverless functions ธรรมดา (ทิ้งไว้ได้ไม่เป็นไรครับ)
  functions = "netlify/functions"

[build.processing]
  skip_processing = false

# ==========================================
# 2. Security & SEO Headers
# ==========================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # การตั้ง Cache ให้ Google เข้ามาอ่านข้อมูลใหม่ได้บ่อยขึ้น
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

# ==========================================
# 3. Edge Functions
# ==========================================
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

[[edge_functions]]
  function = "render-bot"
  path = "/sideline/*"

# ✅ ให้ ssr-province ดักจับหน้า /location/* ทั้งหมด
[[edge_functions]]
  function = "ssr-province"
  path = "/location/*"

# ✅ ให้ ssr-province ดักจับหน้าแรก (Root) ด้วย เพื่อให้เรนเดอร์เชียงใหม่
[[edge_functions]]
  function = "ssr-province"
  path = "/"

# ==========================================
# 4. SEO Redirects & Rewrites
# ==========================================

# 4.1 URL Normalization (จัดการ Query Parameter ให้เป็น Clean URL)
[[redirects]]
  query = {province = ":p"}
  from = "/location/*"
  to = "/location/:p"
  status = 301
  force = true

# 4.2 SPA Fallback (ต้องอยู่ล่างสุดเสมอ)
# ดักจับหน้าที่หาไม่เจอให้วิ่งไปที่ index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200