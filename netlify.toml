# name=netlify.toml
# ==============================================================================
# Netlify configuration for First Model Hub
# - Security-first headers (CSP, HSTS, X-Frame, etc.)
# - Long-term caching for static assets
# - Edge function mapping (sitemap, ssr-province, render-bot)
# - Redirects for canonical domain migration + SPA fallbacks
# ==============================================================================
[build]
  publish = "."
  functions = "netlify/functions"

[build.processing]
  skip_processing = false

# ==============================================================================
# 1. GLOBAL SECURITY & PERFORMANCE HEADERS
# Notes:
# - Content-Security-Policy (CSP) below is restrictive by default.
# - Add additional trusted domains to script-src/style-src/img-src/connect-src as needed.
# - Replace placeholder domains if you add other CDNs or analytics.
# ==============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Cache-Control for HTML: short-lived, allow CDN/stale-while-revalidate for performance
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"
    # Content-Security-Policy (example): adjust if you use additional external services
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://zxetzqwjaiumqhrpumln.supabase.co https://images.unsplash.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://zxetzqwjaiumqhrpumln.supabase.co https://api.mapbox.com;"

# Long cache for static assets to maximize speed (immutable)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==============================================================================
# 2. EDGE FUNCTIONS (keep mapping per project structure)
# - sitemap: generates dynamic sitemap.xml using Supabase (reads env vars)
# - ssr-province: SSR for root /location/* /index.html and robots.txt
# - render-bot: SSR optimized for bots on /sideline/* profiles
# ==============================================================================
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

[[edge_functions]]
  function = "ssr-province"
  path = "/robots.txt"

[[edge_functions]]
  function = "render-bot"
  path = "/sideline/*"

[[edge_functions]]
  function = "ssr-province"
  path = "/location/*"

[[edge_functions]]
  function = "ssr-province"
  path = "/"

[[edge_functions]]
  function = "ssr-province"
  path = "/index.html"

# ==============================================================================
# 3. REDIRECTS & REWRITES (SEO-friendly canonicalization + SPA fallbacks)
# - force redirects to enforce canonical domain
# - SPA routes map to index.html with 200 to allow client-side routing
# NOTE: Ensure DNS/CNAME is set for firstmodelhub.com before enabling force redirects.
# ==============================================================================
[[redirects]]
  from = "https://www.firstmodelhub.com/*"
  to = "https://firstmodelhub.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://sidelinechiangmai.netlify.app/*"
  to = "https://firstmodelhub.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.sidelinechiangmai.netlify.app/*"
  to = "https://firstmodelhub.com/:splat"
  status = 301
  force = true

# Normalize location query param -> clean path (if you send /location?province=xxx)
[[redirects]]
  query = { province = ":p" }
  from = "/location/*"
  to = "/location/:p"
  status = 301
  force = true

# SPA fallbacks: serve index.html so client-side routing works and bots get full HTML via edge functions
[[redirects]]
  from = "/sideline/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/profiles"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/locations"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200