# ==============================================================================
# 1. Build Settings & Platform Target
# ==============================================================================
[build]
  publish = "."
  # ตำแหน่งเก็บฟังก์ชันประมวลผลเซิร์ฟเวอร์เลสทั่วไป
  functions = "netlify/functions"

[build.processing]
  skip_processing = false

# ==============================================================================
# 2. S-Tier Security & Specular Core Web Vitals Headers
# ==============================================================================
# กฎควบคุมความปลอดภัยหลักของเว็บไซต์สำหรับทุกพาร์ททางเข้า
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # ปรับปรุงประสิทธิภาพ TTFB: การันตีหน้าเว็บมีการสื่อสารแบบสดใหม่เสมอ แต่ลดแรงกดโหลดด้วย stale-while-revalidate
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"

# ⚡ เร่งความเร็วการโหลดไฟล์ดีไซน์ (CSS) ตลอดปีเพื่อคะแนนสปีดที่ดีที่สุด
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ⚡ เร่งความเร็วการโหลดสคริปต์หลัก (JS)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ⚡ เร่งความเร็วการดึงรูปภาพพื้นหลังและไอคอนภายในระบบ
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==============================================================================
# 3. Optimized Edge Functions Mapping (Consolidated Edge Routing)
# ==============================================================================
# ชี้เป้าหมายให้ Edge Function ชื่อ sitemap (ไฟล์ sitemap.js) ทำหน้าที่สร้างพ่นข้อมูล XML
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

# ชี้เป้าหมายให้ ssr-province เป็นตัวส่งข้อมูลการกรองสปายบอทของ robots.txt
[[edge_functions]]
  function = "ssr-province"
  path = "/robots.txt"

# จัดหน้าแสดงผลเฉพาะของตัวบอทแสกนหน้าโปรไฟล์น้อง ๆ เดี่ยว
[[edge_functions]]
  function = "render-bot"
  path = "/sideline/*"

# ให้ ssr-province ดักจับหน้าภูมิภาค /location/* ทั้งหมดเพื่อส่งข้อมูล Dynamic
[[edge_functions]]
  function = "ssr-province"
  path = "/location/*"

# ให้ ssr-province ดักจับพาร์ทหน้าแรกสุด (/) เพื่อจัดส่งสารบัญหลักทันทีแบบ Zero-Delay
[[edge_functions]]
  function = "ssr-province"
  path = "/"

# ⚡ กำหนดเส้นทางให้ ssr-province ดักจับการเข้าใช้งานหน้า /index.html 
# เพื่อคุมการข้ามการดาวน์โหลดเทมเพลต และทำการ Redirect อย่างปลอดภัยผ่าน Edge Function หลังบ้าน
[[edge_functions]]
  function = "ssr-province"
  path = "/index.html"

# ==============================================================================
# 4. SEO Redirects & Rewrites Matrix
# ==============================================================================

# 🛠️ 4.1 URL Canonicalization: บังคับเปลี่ยนเส้นทางจาก www ไปยัง non-www บนโดเมนใหม่
[[redirects]]
  from = "https://www.firstmodelhub.com/*"
  to = "https://firstmodelhub.com/:splat"
  status = 301
  force = true

# 🛠️ 4.2 SEO Domain Migration: ย้ายทราฟฟิกและคะแนน SEO จากโดเมน Netlify เดิมไปยังโดเมนใหม่ 100%
[[redirects]]
  from = "https://sidelinechiangmai.netlify.app/*"
  to = "https://firstmodelhub.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.sidelinechiangmai.netlify.app/*"
  to = "https://firstmodelhub.com/:splat"
  status = 301
  force = true

# 4.3 URL Normalization: เคลียร์พารามิเตอร์ขยะให้เป็นพาร์ทไดเรกทอรีที่ Google ชื่นชอบ
[[redirects]]
  query = {province = ":p"}
  from = "/location/*"
  to = "/location/:p"
  status = 301
  force = true

# 🛠️ 4.4 เจาะจงเส้นทางเฉพาะของระบบแอปพลิเคชัน (SPA Fallback แบบปลอดภัย)
# การดักจับเส้นทางทีละพาร์ทจะช่วยป้องกันไม่ให้บอทรายงานปัญหาหน้า 404 ตอบกลับสถานะเป็น 200 OK 

# ⚡ ดักจับพาร์ทหน้าโปรไฟล์ย่อยไปยังหน้า index.html เพื่อความราบรื่นในการเข้าถึงแบบลอยตัว (Lightbox)
[[redirects]]
  from = "/sideline/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/profiles"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/locations"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200