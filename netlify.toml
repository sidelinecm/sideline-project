# ==========================================
# 1. Build Settings
# ==========================================
[build]
  publish = "."                  # โฟลเดอร์ที่เก็บไฟล์ index.html (Root)
  functions = "netlify/functions" # โฟลเดอร์สำหรับ Serverless Functions (ถ้ามี)

[build.processing]
  skip_processing = false        # อนุญาตให้ Netlify ช่วย Optimize ไฟล์ (เช่น Minify)

# ==========================================
# 2. Security Headers (Best Practices)
# ==========================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cache-Control = "public, max-age=0, must-revalidate"

# ==========================================
# 3. Edge Functions (รันก่อน Redirects เสมอ)
# ==========================================
# ตรวจสอบไฟล์ใน: netlify/edge-functions/
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

[[edge_functions]]
  function = "render-bot"        # สำหรับทำ Dynamic Rendering / SEO
  path = "/sideline/*"

[[edge_functions]]
  function = "ssr-province"      # สำหรับ Server-side Logic ของจังหวัด
  path = "/location/*"

# ==========================================
# 4. Redirects & Rewrite Rules
# ==========================================

# --- 4.1 Force HTTPS (SEO Standard) ---
[[redirects]]
  from = "http://sidelinechiangmai.netlify.app/*"
  to = "https://sidelinechiangmai.netlify.app/:splat"
  status = 301
  force = true

# --- 4.2 จัดการ URL ภาษาไทย (SEO Fix) ---
# แก้ไขลิงก์ที่ถูก Encode มาให้เป็น Clean URL
[[redirects]]
  from = "/sideline/%E0%B8%9B%E0%B8%B9%E0%B9%80%E0%B8%9B%E0%B9%82"
  to = "/sideline/puep-87"
  status = 301

# --- 4.3 จัดการนามสกุลไฟล์เก่า (.html) ---
# แก้ไขจาก * เป็น :splat เพื่อให้ส่งค่าไปยังปลายทางได้ถูกต้อง
[[redirects]]
  from = "/profiles/:splat.html"
  to = "/profiles/:splat"
  status = 301
  force = true

# --- 4.4 จัดการ Query Parameters (Location Filtering) ---
# เปลี่ยนจาก /location/something?province=bangkok -> /location/bangkok
[[redirects]]
  query = {province = ":p"}
  from = "/location/*"
  to = "/location/:p"
  status = 301
  force = true

# --- 4.5 SPA Fallback (กฎสุดท้าย) ---
# สำคัญ: ต้องอยู่ล่างสุดเสมอ!
# ถ้าไม่มีไฟล์จริง และ Edge Function ปล่อยผ่าน (Next) จะส่งไปที่ index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
