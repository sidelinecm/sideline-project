[build]
  publish = "." 
  functions = "netlify/functions"
  [build.processing]
    skip_processing = false

# Headers ใหม่ (แทนที่ส่วน [1] เดิม)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cache-Control = "public, max-age=0, must-revalidate"

# --- [2] Edge Functions ---
# Netlify จะรัน Edge Functions ก่อน Redirects เสมอ
# ตรวจสอบให้แน่ใจว่าไฟล์ชื่อ sitemap.js, render-bot.js, ssr-province.js อยู่ใน folder netlify/edge-functions

[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

[[edge_functions]]
  function = "render-bot"
  path = "/sideline/*"

[[edge_functions]]
  function = "ssr-province"
  path = "/location/*"

# --- [3] Redirects ---

# 3.1 บังคับ HTTPS (SEO Standard)
[[redirects]]
  from = "http://sidelinechiangmai.netlify.app/*"
  to = "https://sidelinechiangmai.netlify.app/:splat"
  status = 301
  force = true

# 3.2 จัดการ Link เก่าที่เสีย (สำคัญมากสำหรับคะแนน SEO เดิม)
[[redirects]]
  from = "/sideline/nongmaprang-154-154-154"
  to = "/sideline/nongmaprang-154"
  status = 301
  force = true

[[redirects]]
  from = "/sideline/obwi-96-96-96"
  to = "/sideline/obwi-96"
  status = 301
  force = true

[[redirects]]
  from = "/sideline/pay-136-136-136"
  to = "/sideline/pay-136"
  status = 301
  force = true

# ดักจับลิงก์ภาษาไทย
[[redirects]]
  from = "/sideline/%E0%B8%9B%E0%B8%B9%E0%B9%80%E0%B8%9B%E0%B9%82"
  to = "/sideline/puep-87"
  status = 301

# จัดการนามสกุลไฟล์เก่า .html
[[redirects]]
  from = "/profiles/*.html"
  to = "/profiles/:splat"
  status = 301
  force = true

[[redirects]]
  query = {province = ":p"}   # ตัวนี้จะจับคำว่า lampang, chiangmai, bangkok ฯลฯ
  from = "/location/:any"     # ตัวนี้จะจับ path อะไรก็ได้หลัง /location/
  to = "/location/:p"         # แล้วส่งไปที่ path ใหม่โดยใช้ค่าจาก province
  status = 301
  force = true

# --- [4] SPA Fallback (กฎสุดท้าย) ---
# สำคัญ: ถ้า Edge Function (render-bot) สั่ง context.next() 
# มันจะหลุดมาที่กฎนี้ เพื่อให้ Client-Side Rendering ทำงานต่อ (ไม่เกิดหน้าขาว)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200